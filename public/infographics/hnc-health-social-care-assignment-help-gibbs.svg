<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="100%" role="img" aria-labelledby="hnc-hsc-title">
  <title id="hnc-hsc-title">HNC Health Social Care Assignment Help: Gibbs Reflective Cycle 6 Stages Description Feelings Evaluation Analysis Conclusion Action Plan, Parsons Sick Role 1951, Goffman Stigma 1963, Dahlgren Whitehead Rainbow Model 1991, Marmot Review 2010, Care Act 2014, Mental Capacity Act 2005</title>

  <!-- Background -->
  <rect width="800" height="640" fill="#F4F7FB" rx="14"/>

  <!-- Header -->
  <rect width="800" height="64" fill="#1B3A6B" rx="14"/>
  <rect y="50" width="800" height="14" fill="#1B3A6B"/>
  <text x="400" y="28" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">HNC Health and Social Care: Theory and Reflection Framework</text>
  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Gibbs (1988) · Parsons (1951) · Goffman (1963) · Dahlgren &amp; Whitehead (1991) · Marmot (2010)</text>

  <!-- Gibbs header -->
  <rect x="28" y="82" width="744" height="22" rx="4" fill="#2563EB"/>
  <text x="400" y="97" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">GIBBS' REFLECTIVE CYCLE (1988) — 6 Stages · Distinction Grade Concentrated in Stage 4: Analysis</text>

  <!-- 6 Gibbs stage boxes -->
  <rect x="28" y="112" width="118" height="96" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="28" y="112" width="118" height="22" rx="6" fill="#1B3A6B"/>
  <rect x="28" y="122" width="118" height="12" fill="#1B3A6B"/>
  <text x="87" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">1. DESCRIPTION</text>
  <text x="40" y="148" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">What happened?</text>
  <text x="40" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Setting, people,</text>
  <text x="40" y="176" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">sequence of events</text>
  <text x="40" y="200" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#6B7280">Pass-level sufficient</text>

  <rect x="160" y="112" width="118" height="96" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="160" y="112" width="118" height="22" rx="6" fill="#1B3A6B"/>
  <rect x="160" y="122" width="118" height="12" fill="#1B3A6B"/>
  <text x="219" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">2. FEELINGS</text>
  <text x="172" y="148" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">What were you</text>
  <text x="172" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">thinking and feeling?</text>
  <text x="172" y="176" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Honest reflection</text>
  <text x="172" y="200" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#6B7280">Pass-level sufficient</text>

  <rect x="292" y="112" width="118" height="96" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="292" y="112" width="118" height="22" rx="6" fill="#2563EB"/>
  <rect x="292" y="122" width="118" height="12" fill="#2563EB"/>
  <text x="351" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">3. EVALUATION</text>
  <text x="304" y="148" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">What was good</text>
  <text x="304" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">and bad about</text>
  <text x="304" y="176" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">the experience?</text>
  <text x="304" y="200" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#6B7280">Pass–Merit boundary</text>

  <!-- Stage 4 Analysis - highlighted -->
  <rect x="424" y="108" width="122" height="104" rx="6" fill="#7C3AED" stroke="#7C3AED" stroke-width="2"/>
  <text x="485" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">4. ANALYSIS ★</text>
  <text x="436" y="144" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#FFFFFF">What SENSE can you</text>
  <text x="436" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#FFFFFF">make of the situation?</text>
  <text x="436" y="172" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E9D5FF">Apply named theory +</text>
  <text x="436" y="186" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#E9D5FF">cite academic sources</text>
  <text x="436" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" fill="#FDE68A">DISTINCTION HERE</text>

  <rect x="560" y="112" width="100" height="96" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="560" y="112" width="100" height="22" rx="6" fill="#2563EB"/>
  <rect x="560" y="122" width="100" height="12" fill="#2563EB"/>
  <text x="610" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">5. CONCLUSION</text>
  <text x="572" y="148" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">What else could</text>
  <text x="572" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">you have done?</text>
  <text x="572" y="176" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Alternative actions</text>
  <text x="572" y="200" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#6B7280">Grounded in Stage 4</text>

  <rect x="674" y="112" width="98" height="96" rx="6" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="674" y="112" width="98" height="22" rx="6" fill="#D97706"/>
  <rect x="674" y="122" width="98" height="12" fill="#D97706"/>
  <text x="723" y="127" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">6. ACTION PLAN</text>
  <text x="686" y="148" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">If it arose again,</text>
  <text x="686" y="162" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">what would you do?</text>
  <text x="686" y="176" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Specific action steps</text>
  <text x="686" y="200" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" fill="#6B7280">Must follow from Stage 4</text>

  <!-- Sociological theories header -->
  <rect x="28" y="224" width="744" height="22" rx="4" fill="#7C3AED"/>
  <text x="400" y="239" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">SOCIOLOGICAL FRAMEWORKS — Apply in Gibbs Stage 4 · Cite originating theorist · Evaluate limitations at Distinction</text>

  <!-- Parsons -->
  <rect x="28" y="254" width="232" height="130" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="44" y="272" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#7C3AED">PARSONS' SICK ROLE (1951)</text>
  <text x="44" y="287" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">4 components:</text>
  <text x="44" y="301" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">① Exempt from normal responsibilities</text>
  <text x="44" y="315" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">② Not blamed for condition</text>
  <text x="44" y="329" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">③ Obliged to want to recover</text>
  <text x="44" y="343" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">④ Obliged to seek medical help</text>
  <text x="44" y="360" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#DC2626">Limitation: assumes acute illness · ignores chronic conditions</text>
  <text x="44" y="374" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Paternalistic — conflicts with social model + MCA 2005</text>

  <!-- Goffman -->
  <rect x="284" y="254" width="232" height="130" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="300" y="272" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#7C3AED">GOFFMAN'S STIGMA (1963)</text>
  <text x="300" y="287" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">3 stigma types:</text>
  <text x="300" y="301" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">① Abominations of body (physical diff.)</text>
  <text x="300" y="315" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">② Blemishes of character (addiction/MH)</text>
  <text x="300" y="329" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">③ Tribal stigma (race/religion/nationality)</text>
  <text x="300" y="343" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Apply to: MH help-seeking, substance misuse,</text>
  <text x="300" y="357" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">disability in workplace and care settings</text>
  <text x="300" y="374" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" font-weight="700" fill="#DC2626">Limitation: ignores structural/institutional stigma</text>

  <!-- Health inequality models -->
  <rect x="540" y="254" width="232" height="130" rx="6" fill="#FFFFFF" stroke="#DDD6FE" stroke-width="1.5"/>
  <text x="556" y="272" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#7C3AED">HEALTH INEQUALITY FRAMEWORKS</text>
  <text x="556" y="287" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#374151">Dahlgren &amp; Whitehead (1991) Rainbow:</text>
  <text x="556" y="301" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Layer 1: Individual lifestyle factors</text>
  <text x="556" y="315" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Layer 2: Social/community networks</text>
  <text x="556" y="329" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Layer 3: Living/working conditions</text>
  <text x="556" y="343" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Layer 4: Socioeconomic/cultural/env.</text>
  <text x="556" y="358" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#374151">Marmot Review (2010): social gradient</text>
  <text x="556" y="372" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" fill="#374151">Health improves with each social step up</text>

  <!-- Legislation strip -->
  <rect x="28" y="398" width="744" height="64" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="44" y="418" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">KEY LEGISLATION — Apply principles to scenario at Merit · Evaluate tensions at Distinction</text>
  <text x="44" y="434" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Care Act 2014: Wellbeing principle — dignity, physical/mental health, protection from abuse, social/economic wellbeing, suitable housing</text>
  <text x="44" y="450" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">MCA 2005: 5 principles — presumption of capacity · supported decision-making · right to make unwise decisions · best interests · least restrictive option</text>
  <text x="44" y="454" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8" fill="#374151">Equality Act 2010: 9 protected characteristics — duty to make reasonable adjustments applies to care communication scenarios</text>

  <!-- Analysis stage example -->
  <rect x="28" y="476" width="744" height="66" rx="6" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="44" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#92400E">DISTINCTION vs PASS IN GIBBS STAGE 4 — Worked Example</text>
  <text x="44" y="512" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Pass: "I could have communicated better with the service user during the assessment."</text>
  <text x="44" y="527" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Distinction: "Goffman's (1963) stigma theory explains the service user's reluctance — mental health stigma (blemish of character type) may have inhibited disclosure. The MCA 2005 presumption of capacity required me to adapt my communication approach rather than escalate to a capacity assessment prematurely."</text>
  <text x="44" y="534" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7" font-weight="700" fill="#92400E">Named theory + legislative principle + critical evaluation of own practice = Distinction Analysis</text>

  <!-- Footer -->
  <text x="400" y="630" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" fill="#9CA3AF">HNC Assignment Help Service · HNC Health and Social Care Theory and Reflection Framework</text>
</svg>
