  <text x="400" y="97" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">CRITICAL PRINCIPLE: Working code / correct diagrams / functional database = PASS only</text>
  <text x="400" y="109" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#FECACA">Merit requires design rationale · Distinction requires critical evaluation of design decisions and limitations</text>

