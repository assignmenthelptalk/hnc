  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Merit and Distinction are awarded for written analytical commentary — not for technical competence alone</text>

  <!-- Key principle banner -->
