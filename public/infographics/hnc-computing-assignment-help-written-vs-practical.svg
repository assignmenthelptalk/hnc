  <title id="hnc-computing-title">HNC Computing Written vs Practical Assessment Split: Programming Design Analysis, Networking OSI Protocol Justification, Database Normalisation 1NF 2NF 3NF, Systems Analysis UML Waterfall Agile SSADM Pass Merit Distinction</title>

