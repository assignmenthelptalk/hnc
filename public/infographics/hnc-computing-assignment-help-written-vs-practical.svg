  <!-- Merit test -->
  <rect x="28" y="372" width="744" height="70" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="44" y="390" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#1D4ED8">THE MERIT TEST — Does your written commentary answer WHY?</text>
  <text x="44" y="406" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Pass commentary: "I used an INNER JOIN to retrieve records from both tables where a matching student_id exists."</text>
  <text x="44" y="421" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" fill="#374151">Merit commentary: "An INNER JOIN was selected because the query requires only records with a confirmed match in both tables — a LEFT OUTER JOIN would return NULL values for unmatched rows, which would misrepresent enrolment data where incomplete records must be excluded from the analysis."</text>
  <text x="44" y="436" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#1D4ED8">The Merit connector: "because," "in order to," "in contrast to," "this approach was selected because it enables"</text>

