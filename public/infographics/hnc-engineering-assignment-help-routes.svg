  <text x="400" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#A8C4E0">Written Analytical Report Sections Only — Calculations, Derivations, and Lab Work Not Covered</text>

